<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <!-- Abstract "E" and "H" / Connection Hub Design -->
    <defs>
        <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
        </linearGradient>
    </defs>
    <!-- Outer ring representing the 'Hub' -->
    <circle cx="50" cy="50" r="45" fill="none" stroke="url(#logo-gradient)" stroke-width="2" stroke-dasharray="10 5" opacity="0.2" />
    <!-- Dynamic logo shape -->
    <path d="M35 25C30 25 25 30 25 35V65C25 70 30 75 35 75H65" stroke="darkslategray" stroke-width="8" fill="none" stroke-linecap="round" />
    <path d="M45 40L65 50L45 60" fill="url(#logo-gradient)" />
    <circle cx="65" cy="50" r="12" fill="url(#logo-gradient)" opacity="0.3" />
    <circle cx="65" cy="50" r="6" fill="url(#logo-gradient)" />
</svg>
